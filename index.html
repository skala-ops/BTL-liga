<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BTL – Tenisová liga</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f5f0eb;
      color: #1a1a1a;
      min-height: 100vh;
    }

    /* Header */
    .site-header {
      background: #C1440E;
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .site-title {
      font-family: 'Oswald', sans-serif;
      font-size: 1.4rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .site-subtitle {
      font-size: 12px;
      color: rgba(255,255,255,.7);
      margin-top: 2px;
      letter-spacing: .04em;
    }
    .update-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.3);
      color: #fff;
      font-family: 'Oswald', sans-serif;
      font-size: 13px;
      letter-spacing: .05em;
      text-transform: uppercase;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
    }
    .update-btn:hover { background: rgba(255,255,255,.25); }
    .update-btn svg { width: 15px; height: 15px; flex-shrink: 0; }
    #fileInput { display: none; }

    /* Court SVG decoration in header */
    .court-deco {
      position: absolute;
      right: 160px;
      top: 50%;
      transform: translateY(-50%);
      opacity: .12;
      pointer-events: none;
    }

    .site-header { position: relative; overflow: hidden; }

    /* Main layout */
    .main {
      max-width: 860px;
      margin: 0 auto;
      padding: 1.5rem 1rem 3rem;
    }

    /* Last updated */
    .meta-bar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      font-size: 11px;
      color: #888;
      margin-bottom: 1.25rem;
    }
    .meta-bar svg { width: 12px; height: 12px; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 4rem 1.5rem;
      background: #fff;
      border-radius: 12px;
      border: 1.5px dashed #d9b8a8;
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: .75rem; opacity: .4; }
    .empty-state h2 {
      font-family: 'Oswald', sans-serif;
      font-size: 1.1rem;
      font-weight: 500;
      color: #555;
      margin-bottom: .5rem;
    }
    .empty-state p { font-size: 13px; color: #888; line-height: 1.6; }

    /* Section */
    .section { margin-bottom: 1.5rem; }
    .section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: .7rem 1.1rem;
      border-radius: 10px 10px 0 0;
    }
    .section-header.clay { background: #C1440E; }
    .section-header.grass { background: #2D4A1E; }
    .section-header svg { width: 15px; height: 15px; color: #fff; flex-shrink: 0; }
    .section-label {
      font-family: 'Oswald', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: .08em;
      color: #fff;
      text-transform: uppercase;
    }
    .section-body {
      background: #fff;
      border: 0.5px solid #e0d8d0;
      border-top: none;
      border-radius: 0 0 10px 10px;
      overflow: hidden;
    }

    /* Standings table */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead tr { background: #C1440E; }
    thead th {
      color: #fff;
      font-family: 'Oswald', sans-serif;
      font-weight: 500;
      font-size: 11px;
      letter-spacing: .07em;
      text-transform: uppercase;
      padding: 9px 10px;
      text-align: center;
      white-space: nowrap;
    }
    thead th:nth-child(2) { text-align: left; padding-left: 14px; }
    tbody tr { border-bottom: 0.5px solid #f0ebe4; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #faf7f4; }
    tbody td { padding: 9px 10px; text-align: center; color: #1a1a1a; }
    tbody td:nth-child(2) { text-align: left; padding-left: 14px; font-weight: 500; }

    .rank {
      font-family: 'Oswald', sans-serif;
      font-size: 15px;
      font-weight: 600;
      display: inline-block;
      width: 22px;
      text-align: center;
    }
    .rank-1 { color: #C1440E; }
    .rank-2 { color: #888; }
    .rank-3 { color: #A0673A; }

    .pts-badge {
      display: inline-block;
      background: #C1440E;
      color: #fff;
      font-family: 'Oswald', sans-serif;
      font-size: 12px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 20px;
      min-width: 30px;
      text-align: center;
    }
    .wins { color: #3B6D11; font-weight: 500; }
    .losses { color: #A32D2D; font-weight: 500; }
    .muted { color: #aaa; font-size: 11px; }

    /* Match cards */
    .match-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      border-bottom: 0.5px solid #f0ebe4;
      font-size: 13px;
    }
    .match-row:last-child { border-bottom: none; }
    .match-row:hover { background: #faf7f4; }
    .p1 { text-align: right; }
    .p2 { text-align: left; }
    .player-name { font-weight: 500; color: #1a1a1a; }
    .player-name.winner {
      font-family: 'Oswald', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #C1440E;
    }
    .score-center { text-align: center; }
    .sets-label {
      display: inline-block;
      font-family: 'Oswald', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: #666;
      background: #f5f0eb;
      padding: 3px 9px;
      border-radius: 20px;
    }
    .score-detail {
      display: flex;
      gap: 3px;
      justify-content: center;
      margin-top: 3px;
    }
    .score-detail span {
      font-family: 'Oswald', sans-serif;
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 3px;
      background: #f5f0eb;
      color: #888;
    }
    .score-detail span.sw { color: #3B6D11; }
    .score-detail span.sl { color: #A32D2D; }

    /* Responsive */
    @media (max-width: 500px) {
      .site-title { font-size: 1.1rem; }
      .update-btn span { display: none; }
      table { font-size: 11px; }
      thead th, tbody td { padding: 7px 6px; }
      tbody td:nth-child(2) { padding-left: 8px; }
      .match-row { padding: 8px 10px; font-size: 12px; gap: 5px; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <svg class="court-deco" width="180" height="120" viewBox="0 0 180 120" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="4" y="4" width="172" height="112" stroke="white" stroke-width="2"/>
    <line x1="90" y1="4" x2="90" y2="116" stroke="white" stroke-width="1.5"/>
    <rect x="30" y="4" width="120" height="112" stroke="white" stroke-width="1.5"/>
    <line x1="30" y1="60" x2="150" y2="60" stroke="white" stroke-width="1.5"/>
    <line x1="90" y1="4" x2="90" y2="60" stroke="white" stroke-width="1"/>
    <line x1="90" y1="60" x2="90" y2="116" stroke="white" stroke-width="1"/>
  </svg>
  <div>
    <div class="site-title">BTL – Tenisová liga</div>
    <div class="site-subtitle">Aktuální sezona</div>
  </div>
  <button class="update-btn" onclick="document.getElementById('fileInput').click()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    <span>Aktualizovat data</span>
  </button>
  <input type="file" id="fileInput" accept=".xlsx,.xls" onchange="handleFile(event)">
</header>

<main class="main">
  <div class="meta-bar" id="metaBar" style="display:none">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <span id="metaText"></span>
  </div>

  <div id="emptyState" class="empty-state">
    <div class="icon">🎾</div>
    <h2>Zatím žádná data</h2>
    <p>Klikni na „Aktualizovat data" v pravém horním rohu<br>a nahraj soubor <strong>btl_online.xlsx</strong>.</p>
  </div>

  <div id="dashboard" style="display:none">
    <!-- Standings -->
    <div class="section">
      <div class="section-header clay">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        <span class="section-label">Žebříček</span>
      </div>
      <div class="section-body">
        <table>
          <thead><tr>
            <th>#</th><th>Hráč</th><th>V</th><th>P</th><th>S+</th><th>S−</th><th>Skóre</th><th>Body</th>
          </tr></thead>
          <tbody id="standingsBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Matches -->
    <div class="section">
      <div class="section-header grass">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M4.93 4.93c4.69 4.69 4.69 10.55 0 14.14M19.07 4.93c-4.69 4.69-4.69 10.55 0 14.14"/></svg>
        <span class="section-label">Výsledky zápasů</span>
      </div>
      <div class="section-body" id="matchesBody"></div>
    </div>
  </div>
</main>

<script>
// ── Parser ────────────────────────────────────────────────────────────────────
function parseFile(wb) {
  const ws = wb.Sheets[wb.SheetNames[0]];
  if (!ws) return null;
  const raw = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
  const get = (r, c) => { const row = raw[r]; return row ? (row[c] ?? null) : null; };

  // Find header row (contains "Jméno")
  let hi = -1;
  for (let i = 0; i < raw.length; i++) {
    if (raw[i] && raw[i][1] === 'Jméno') { hi = i; break; }
  }
  if (hi < 0) return null;

  const headerRow = raw[hi];
  const SKIP = new Set(['jméno', 'zápasy', 'body', 'sety', 'skóre', '', 'null', 'undefined']);
  const opps = [];
  headerRow.forEach((v, ci) => {
    if (ci < 2) return;
    const label = v != null ? String(v).trim() : '';
    if (!label || SKIP.has(label.toLowerCase())) return;
    opps.push({ name: label, col: ci });
  });

  const players = [];
  for (let i = hi + 1; i < raw.length; i++) {
    const name = get(i, 1);
    if (!name || String(name).trim() === '') break;
    players.push({ name: String(name).trim(), ri: i });
  }
  if (!players.length) return null;

  const stats = {};
  players.forEach(p => { stats[p.name] = { wins: 0, losses: 0, sW: 0, sL: 0, gW: 0, gL: 0 }; });
  const pNames = players.map(p => p.name);
  const matches = [];

  players.forEach((p, pi) => {
    opps.forEach(opp => {
      if (p.name === opp.name) return;
      const c = opp.col, r = p.ri;
      const raw1w = get(r, c), raw1l = get(r, c + 1);
      if (raw1w === null && raw1l === null) return;

      const g1w = +raw1w || 0, g1l = +raw1l || 0;
      const g2w = +get(r, c + 2) || 0, g2l = +get(r, c + 3) || 0;
      const sbw = +get(r, c + 4) || 0, sbl = +get(r, c + 5) || 0;

      const s1p = g1w > g1l ? 1 : 0, s2p = g2w > g2l ? 1 : 0;
      let sP = s1p + s2p, sO = 2 - sP, stbP = 0;
      if (sP === 1 && sO === 1 && (sbw || sbl)) {
        stbP = sbw > sbl ? 1 : 0;
        sP += stbP; sO += (1 - stbP);
      }

      const oppIdx = pNames.indexOf(opp.name);
      if (pi < oppIdx || oppIdx < 0) {
        const winner = sP > sO ? p.name : opp.name;
        let sc = `${g1w}:${g1l}`;
        if (g2w || g2l) sc += ` ${g2w}:${g2l}`;
        if (sbw || sbl) sc += ` (${sbw}:${sbl})`;
        matches.push({
          p1: p.name, p2: opp.name, winner,
          sets: `${sP > sO ? 2 : 1}:${sP > sO ? (stbP ? 1 : sO) : 2}`,
          sc
        });
      }

      const s = stats[p.name];
      if (sP > sO) s.wins++; else s.losses++;
      s.sW += sP > sO ? 2 : (stbP ? 1 : sP);
      s.sL += sP > sO ? (stbP ? 1 : sO) : 2;
      s.gW += g1w + g2w; s.gL += g1l + g2l;
    });
  });

  const standings = players
    .map(p => ({ name: p.name, ...stats[p.name], pts: stats[p.name].wins * 2 }))
    .sort((a, b) => b.pts - a.pts || b.wins - a.wins || (b.sW - b.sL) - (a.sW - a.sL));

  return { standings, matches };
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(data) {
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('metaBar').style.display = 'flex';

  const now = new Date();
  document.getElementById('metaText').textContent =
    'Aktualizováno ' + now.toLocaleDateString('cs-CZ') + ' v ' +
    now.toLocaleTimeString('cs-CZ', { hour: '2-digit', minute: '2-digit' });

  const { standings, matches } = data;

  // Standings
  document.getElementById('standingsBody').innerHTML = standings.map((p, i) => {
    const r = i + 1;
    const rc = r === 1 ? 'rank-1' : r === 2 ? 'rank-2' : r === 3 ? 'rank-3' : '';
    const none = !p.wins && !p.losses;
    const d = '<span class="muted">—</span>';
    return `<tr>
      <td><span class="rank ${rc}">${r}</span></td>
      <td>${p.name}</td>
      <td class="${none ? 'muted' : 'wins'}">${none ? '—' : p.wins}</td>
      <td class="${none ? 'muted' : 'losses'}">${none ? '—' : p.losses}</td>
      <td>${none ? d : p.sW}</td>
      <td>${none ? d : p.sL}</td>
      <td style="font-size:11px;color:#999">${none ? d : p.gW + ':' + p.gL}</td>
      <td><span class="pts-badge">${p.pts}</span></td>
    </tr>`;
  }).join('');

  // Matches
  const mb = document.getElementById('matchesBody');
  if (!matches.length) {
    mb.innerHTML = '<div style="text-align:center;padding:2rem;color:#aaa;font-size:13px">Zatím žádné odehrané zápasy.</div>';
    return;
  }
  mb.innerHTML = matches.map(m => {
    const p1w = m.winner === m.p1, p2w = m.winner === m.p2;
    const chips = m.sc.split(' ').map(s => {
      const [a, b] = s.replace(/[()]/g, '').split(':').map(Number);
      if (isNaN(a) || isNaN(b)) return '';
      return `<span class="${a > b ? 'sw' : 'sl'}">${a}:${b}</span>`;
    }).join('');
    return `<div class="match-row">
      <div class="p1"><span class="player-name ${p1w ? 'winner' : ''}">${m.p1}</span></div>
      <div class="score-center">
        <span class="sets-label">${m.sets}</span>
        <div class="score-detail">${chips}</div>
      </div>
      <div class="p2"><span class="player-name ${p2w ? 'winner' : ''}">${m.p2}</span></div>
    </div>`;
  }).join('');
}

// ── File handler ──────────────────────────────────────────────────────────────
function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = ''; // reset so same file can be re-uploaded
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const wb = XLSX.read(ev.target.result, { type: 'binary' });
      const data = parseFile(wb);
      if (data) render(data);
      else alert('Soubor se nepodařilo načíst. Zkontroluj, že obsahuje správnou strukturu s řádkem „Jméno".');
    } catch (err) {
      alert('Chyba při čtení souboru: ' + err.message);
    }
  };
  reader.readAsBinaryString(file);
}
</script>
</body>
</html>
